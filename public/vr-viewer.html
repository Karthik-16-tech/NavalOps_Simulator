<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INS Vikrant VR Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #070b12;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        padding: 10px 14px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(10, 16, 28, 0.72);
        backdrop-filter: blur(8px);
        color: #e2e8f0;
        border-radius: 10px;
        pointer-events: none;
      }

      .hud h1 {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #bfdbfe;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 11px;
        color: #94a3b8;
      }

      .status {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(10, 16, 28, 0.62);
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #cbd5e1;
        font-size: 11px;
        letter-spacing: 0.03em;
        pointer-events: none;
      }

      .error {
        position: fixed;
        right: 16px;
        top: 16px;
        max-width: min(520px, calc(100% - 32px));
        z-index: 15;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(69, 10, 10, 0.78);
        border: 1px solid rgba(248, 113, 113, 0.45);
        color: #fecaca;
        font-size: 12px;
        line-height: 1.45;
        display: none;
      }

      .error.visible {
        display: block;
      }

      .error code {
        color: #fda4af;
      }

      .stereo-chip {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 12;
        display: none;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(10, 16, 28, 0.72);
        color: #cbd5e1;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stereo-chip.visible {
        display: inline-flex;
      }

      /* VRButton styling */
      .webxr-button {
        position: fixed !important;
        right: 16px !important;
        bottom: 16px !important;
        border-radius: 10px !important;
        border: 1px solid rgba(59, 130, 246, 0.6) !important;
        background: rgba(30, 58, 138, 0.72) !important;
        color: #dbeafe !important;
        font-size: 12px !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        font-weight: 600 !important;
        padding: 10px 14px !important;
      }

      .webxr-button:hover {
        background: rgba(37, 99, 235, 0.9) !important;
      }

      .webxr-button:disabled {
        opacity: 0.65 !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <h1>INS Vikrant 3D Viewer</h1>
      <p>Drag to orbit • Scroll to zoom • Enter VR for stereo view</p>
    </div>
    <div id="stereoChip" class="stereo-chip">Stereo Preview</div>
    <div id="status" class="status">Status: Initializing viewer...</div>
    <div id="errorBox" class="error"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { RGBELoader } from "three/addons/loaders/RGBELoader.js";
      import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
      import { VRButton } from "three/addons/webxr/VRButton.js";

      const app = document.getElementById("app");
      const statusEl = document.getElementById("status");
      const errorBox = document.getElementById("errorBox");
      const stereoChip = document.getElementById("stereoChip");
      const params = new URLSearchParams(window.location.search);
      const stereoPreview = params.get("stereo") === "1";

      if (stereoPreview) {
        stereoChip.classList.add("visible");
      }

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070b12);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(6.5, 3.8, 9);
      const stereoLeftCamera = new THREE.PerspectiveCamera();
      const stereoRightCamera = new THREE.PerspectiveCamera();

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      renderer.xr.enabled = true;
      app.appendChild(renderer.domElement);

      const vrButton = VRButton.createButton(renderer);
      vrButton.classList.add("webxr-button");
      document.body.appendChild(vrButton);

      // Force button label to requested text when available.
      const setVRLabel = () => {
        if (vrButton && vrButton.textContent) {
          if (vrButton.textContent.toLowerCase().includes("enter")) {
            vrButton.textContent = "Enter VR";
          }
        }
      };
      setVRLabel();
      setInterval(setVRLabel, 1200);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 2;
      controls.maxDistance = 35;
      controls.maxPolarAngle = Math.PI * 0.49;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.45;
      controls.target.set(0, 1.7, 0);

      let lastInteractTime = performance.now();
      const onControlStart = () => {
        controls.autoRotate = false;
        lastInteractTime = performance.now();
      };
      const onControlEnd = () => {
        lastInteractTime = performance.now();
      };
      controls.addEventListener("start", onControlStart);
      controls.addEventListener("end", onControlEnd);

      const ambient = new THREE.AmbientLight(0x9fb6d6, 0.25);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xffffff, 1.05);
      key.position.set(12, 16, 10);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.camera.near = 0.5;
      key.shadow.camera.far = 120;
      key.shadow.camera.left = -25;
      key.shadow.camera.right = 25;
      key.shadow.camera.top = 25;
      key.shadow.camera.bottom = -25;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x60a5fa, 0.35);
      fill.position.set(-10, 6, -8);
      scene.add(fill);

      const rim = new THREE.PointLight(0x7dd3fc, 0.28, 40, 2);
      rim.position.set(-4, 4, 5);
      scene.add(rim);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(220, 220),
        new THREE.ShadowMaterial({ opacity: 0.25 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.02;
      ground.receiveShadow = true;
      scene.add(ground);

      const pmrem = new THREE.PMREMGenerator(renderer);
      const roomEnv = new RoomEnvironment(renderer);
      scene.environment = pmrem.fromScene(roomEnv, 0.04).texture;

      new RGBELoader().load(
        "https://threejs.org/examples/textures/equirectangular/royal_esplanade_1k.hdr",
        (hdrTexture) => {
          hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
          scene.environment = pmrem.fromEquirectangular(hdrTexture).texture;
          hdrTexture.dispose();
          statusEl.textContent = "Status: HDR environment loaded";
        },
        undefined,
        () => {
          statusEl.textContent = "Status: Using fallback environment";
        }
      );

      const modelRoot = new THREE.Group();
      scene.add(modelRoot);

      const requestedModel = params.get("modelPath");
      const modelPath = requestedModel && requestedModel.trim().length > 0
        ? requestedModel
        : "/compo/kiev_class_aircraft_carrier.glb";
      const loader = new GLTFLoader();

      const addFallbackModel = () => {
        const hull = new THREE.Mesh(
          new THREE.BoxGeometry(8, 1.2, 2.4),
          new THREE.MeshStandardMaterial({ color: 0x9ca3af, metalness: 0.55, roughness: 0.42 })
        );
        const deck = new THREE.Mesh(
          new THREE.BoxGeometry(7.2, 0.2, 2.1),
          new THREE.MeshStandardMaterial({ color: 0x4b5563, metalness: 0.25, roughness: 0.8 })
        );
        deck.position.y = 0.72;
        const island = new THREE.Mesh(
          new THREE.BoxGeometry(1.1, 1.3, 0.8),
          new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.4, roughness: 0.55 })
        );
        island.position.set(1.2, 1.45, -0.1);
        const fallback = new THREE.Group();
        fallback.add(hull, deck, island);
        fallback.position.y = 1.6;
        modelRoot.add(fallback);
      };

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.add("visible");
      }

      loader.load(
        modelPath,
        (gltf) => {
          const model = gltf.scene;
          model.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;

              const mat = obj.material;
              if (Array.isArray(mat)) {
                mat.forEach((m) => {
                  if (!m) return;
                  if ("metalness" in m) m.metalness = Math.min(0.9, (m.metalness ?? 0.4) + 0.1);
                  if ("roughness" in m) m.roughness = Math.max(0.18, (m.roughness ?? 0.6) - 0.08);
                });
              } else if (mat) {
                if ("metalness" in mat) mat.metalness = Math.min(0.9, (mat.metalness ?? 0.4) + 0.1);
                if ("roughness" in mat) mat.roughness = Math.max(0.18, (mat.roughness ?? 0.6) - 0.08);
              }
            }
          });

          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const scale = 10 / maxDim;

          model.position.sub(center);
          model.scale.setScalar(scale);
          model.position.y += 1.6;

          modelRoot.add(model);
          controls.target.set(0, 1.6, 0);
          controls.update();
          statusEl.textContent = "Status: INS Vikrant model loaded";
        },
        (xhr) => {
          if (xhr.total > 0) {
            const progress = Math.round((xhr.loaded / xhr.total) * 100);
            statusEl.textContent = `Status: Loading model ${progress}%`;
          } else {
            statusEl.textContent = "Status: Loading model...";
          }
        },
        (error) => {
          statusEl.textContent = "Status: Failed to load model";
          showError(
            "Model load failed. Verify /compo/kiev_class_aircraft_carrier.glb is accessible. Showing fallback model."
          );
          addFallbackModel();
          console.error("GLB load error:", error);
        }
      );

      const clock = new THREE.Clock();
      const renderSize = new THREE.Vector2();

      const syncStereoCameras = () => {
        camera.updateMatrixWorld();
        stereoLeftCamera.copy(camera);
        stereoRightCamera.copy(camera);

        const eyeBase = Math.max(0.04, camera.position.distanceTo(controls.target) * 0.0035);
        const rightVector = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).normalize();

        stereoLeftCamera.position.addScaledVector(rightVector, -eyeBase);
        stereoRightCamera.position.addScaledVector(rightVector, eyeBase);

        stereoLeftCamera.aspect = Math.max(0.1, window.innerWidth / 2 / Math.max(1, window.innerHeight));
        stereoRightCamera.aspect = stereoLeftCamera.aspect;
        stereoLeftCamera.updateProjectionMatrix();
        stereoRightCamera.updateProjectionMatrix();

        stereoLeftCamera.updateMatrixWorld();
        stereoRightCamera.updateMatrixWorld();
      };

      renderer.setAnimationLoop(() => {
        const elapsed = clock.getElapsedTime();

        // Re-enable auto-rotate shortly after user interaction in desktop mode.
        if (!renderer.xr.isPresenting) {
          const idleTime = performance.now() - lastInteractTime;
          if (idleTime > 1200) controls.autoRotate = true;
          controls.update();
        }

        // Subtle idle motion to avoid static feel.
        modelRoot.position.y = Math.sin(elapsed * 0.7) * 0.04;

        if (stereoPreview && !renderer.xr.isPresenting) {
          renderer.getSize(renderSize);
          const halfWidth = Math.floor(renderSize.x / 2);
          const fullHeight = renderSize.y;

          syncStereoCameras();
          renderer.setScissorTest(true);
          const previousAutoClear = renderer.autoClear;
          renderer.autoClear = false;
          renderer.clear(true, true, true);

          renderer.setViewport(0, 0, halfWidth, fullHeight);
          renderer.setScissor(0, 0, halfWidth, fullHeight);
          renderer.render(scene, stereoLeftCamera);

          renderer.setViewport(halfWidth, 0, halfWidth, fullHeight);
          renderer.setScissor(halfWidth, 0, halfWidth, fullHeight);
          renderer.render(scene, stereoRightCamera);

          renderer.setScissorTest(false);
          renderer.autoClear = previousAutoClear;
          return;
        }

        renderer.render(scene, camera);
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener("beforeunload", () => {
        controls.dispose();
        renderer.dispose();
      });
    </script>
  </body>
</html>
